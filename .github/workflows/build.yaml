name: Build images

on:
  push:
    branches:
      - main
    paths:
      - images/**
      - .github/workflows/build.yaml
      - renovate.json
  pull_request:
    paths:
      - images/**
      - .github/workflows/build.yaml
      - renovate.json
  schedule:
    - cron: '27 8 * * 1'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: prowlarr
            arg_prefix: PROWLARR
            update_url: https://prowlarr.servarr.com/v1/update/master/changes?runtime=netcore&os=linux&arch=x64
          - app: radarr
            arg_prefix: RADARR
            update_url: https://radarr.servarr.com/v1/update/master/changes?runtime=netcore&os=linux&arch=x64
          - app: sonarr
            arg_prefix: SONARR
            update_url: https://services.sonarr.tv/v1/update/v4-stable/changes?runtime=netcore&os=linux&arch=x64&version=4.0.0.0

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Read pinned version and checksum
        id: version
        shell: bash
        run: |
          set -euo pipefail
          containerfile="images/${{ matrix.app }}/Containerfile"
          version=$(grep -m1 -E "^ARG ${{ matrix.arg_prefix }}_VERSION=" "${containerfile}" | cut -d= -f2)
          sha256=$(grep -m1 -E "^ARG ${{ matrix.arg_prefix }}_SHA256=" "${containerfile}" | cut -d= -f2)
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
          printf 'sha256=%s\n' "${sha256}" >> "${GITHUB_OUTPUT}"

      - name: Check pinned checksum against Servarr API
        shell: bash
        run: |
          set -euo pipefail
          api_hash=$(curl -fsSL '${{ matrix.update_url }}' | jq -r --arg version '${{ steps.version.outputs.version }}' 'first(.[] | select(.version == $version) | .hash) // ""')
          if [[ -z "${api_hash}" ]]; then
            printf '::warning::Could not find version %s in the Servarr update API\n' '${{ steps.version.outputs.version }}'
            exit 0
          fi
          if [[ "${api_hash}" != '${{ steps.version.outputs.sha256 }}' ]]; then
            printf '::warning::Pinned SHA256 does not match Servarr API for %s: pinned=%s api=%s\n' '${{ steps.version.outputs.version }}' '${{ steps.version.outputs.sha256 }}' "${api_hash}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/major/${{ matrix.app }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.app }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/major/container-images

      - name: Build image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: images/${{ matrix.app }}
          file: images/${{ matrix.app }}/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        if: github.event_name != 'pull_request'
        shell: bash
        run: cosign sign --yes ghcr.io/major/${{ matrix.app }}@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/major/${{ matrix.app }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
